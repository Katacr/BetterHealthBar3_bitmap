default_layout:
  images:
    1:
      image: empty
    2:
      image: first
      listener:
        class: health_before
    3:
      image: red
      listener:
        class: health
      conditions:
        1:
          first: health_percentage
          second: 0.33
          operation: "<"
    4:
      image: yellow
      listener:
        class: health
      conditions:
        1:
          first: health_percentage
          second: 0.33
          operation: ">="
        2:
          first: health_percentage
          second: 0.66
          operation: "<"
    5:
      image: green
      listener:
        class: health
      conditions:
        1:
          first: health_percentage
          second: 0.66
          operation: ">="
  texts:
    1:
      # 支持单个字体（字符串）或多个字体（列表）
      # 列表模式下，优先级从上到下，找不到字符时依次向下查找
      text:
        - default_text
        - HYPixel
      pattern: "[entity_name] | [health]/[max_health]"
      align: center
      x: 60
      y: 20
      scale: 0.5
